<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartershop</title>
    <link rel="stylesheet" href="style.css">

    <!-- Tipografía estilo romano/gótico -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Fondo -->
    <div class="background"></div>

    <!-- Título -->
    <header>
        <h1>Cartershop</h1>
    </header>

    <main>

        <!-- Fantasma a la izquierda -->
        <div class="ghost">
            <img src="fantasma-solo.png" alt="Fantasma">
        </div>

        <!-- Cuadro central 2x2 (4 posts) -->
        <section class="grid">

            <!-- Post 1 -->
            <a href="producto1.html" class="post">
                <div class="post-images">
                    <img src="prod1a.jpg" alt="">
                    <img src="prod1b.jpg" alt="">
                </div>
                <div class="overlay">Producto 1</div>
            </a>

            <!-- Post 2 -->
            <a href="producto2.html" class="post">
                <div class="post-images">
                    <img src="prod2a.jpg" alt="">
                    <img src="prod2b.jpg" alt="">
                </div>
                <div class="overlay">Producto 2</div>
            </a>

            <!-- Post 3 -->
            <a href="producto3.html" class="post">
                <div class="post-images">
                    <img src="prod3a.jpg" alt="">
                    <img src="prod3b.jpg" alt="">
                </div>
                <div class="overlay">Producto 3</div>
            </a>

            <!-- Post 4 -->
            <a href="producto4.html" class="post">
                <div class="post-images">
                    <img src="prod4a.jpg" alt="">
                    <img src="prod4b.jpg" alt="">
                </div>
                <div class="overlay">Producto 4</div>
            </a>

        </section>

    </main>

</body>
</html>
