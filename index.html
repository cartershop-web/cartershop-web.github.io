<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARTERSHOP | Official Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="art-layer">
        <img src="fantasma-solo.png" class="bg-ghost g-top-left">
        <img src="fantasma-solo.png" class="bg-ghost g-bottom-right">
    </div>

    <nav class="navbar">
        <div class="logo">CARTERSHOP</div>
        <div class="nav-links">
            <a href="#gallery">Colección</a>
            <a href="https://wa.me/tu-numero" class="btn-contact">Contacto</a>
        </div>
    </nav>

    <header class="hero">
        <h1>CARTERSHOP</h1>
        <p class="subtitle">Curaduría de Estilo & Arte</p>
    </header>

    <main class="container">
        <div class="pinterest-grid" id="gallery">
            <div class="card">
                <div class="image-wrapper double">
                    <img src="https://via.placeholder.com/400x600" alt="Producto 1">
                    <img src="https://via.placeholder.com/400x600" alt="Producto 1 Detalle">
                </div>
                <div class="card-info">
                    <h3>Premium Collection</h3>
                    <span>Ver Detalles</span>
                </div>
            </div>

            <div class="card">
                <div class="image-wrapper">
                    <img src="https://via.placeholder.com/400x500" alt="Producto 2">
                </div>
                <div class="card-info">
                    <h3>Vintage Edition</h3>
                    <span>Disponible</span>
                </div>
            </div>

            <div class="card">
                <div class="image-wrapper double">
                    <div class="placeholder-box"></div>
                    <div class="placeholder-box"></div>
                </div>
                <div class="card-info">
                    <h3>New Drop</h3>
                    <span>Próximamente</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CARTERSHOP. Todos los derechos reservados.</p>
        <div class="social-icons">
            <a href="#">IG</a>
            <a href="#">WA</a>
        </div>
    </footer>

</body>
</html>
