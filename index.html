<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartershop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background"></div>

    <div class="scene">

        <!-- Fantasma izquierda -->
        <div class="ghost">
            <img src="fantasma-solo.png" alt="Fantasma">
        </div>

        <!-- Columna derecha: título + posts -->
        <div class="right-column">

            <h1 class="title">Cartershop</h1>

            <section class="grid">

                <a href="producto1.html" class="post">
                    <img src="prod1a.jpg" class="cover">
                    <div class="overlay">Producto 1</div>
                </a>

                <a href="producto2.html" class="post">
                    <img src="prod2a.jpg" class="cover">
                    <div class="overlay">Producto 2</div>
                </a>

                <a href="producto3.html" class="post">
                    <img src="prod3a.jpg" class="cover">
                    <div class="overlay">Producto 3</div>
                </a>

                <a href="producto4.html" class="post">
                    <img src="prod4a.jpg" class="cover">
                    <div class="overlay">Producto 4</div>
                </a>

            </section>

        </div>

    </div>

</body>
</html>
